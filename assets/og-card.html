<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #060606;
    font-family: 'Courier New', 'Lucida Console', monospace;
  }

  /* Warm sodium scanline texture */
  .stripes {
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 5px,
        rgba(200, 110, 30, 0.025) 5px,
        rgba(200, 110, 30, 0.025) 6px
      );
  }

  /* Paranoid orange glow behind name */
  .glow-blob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(200, 110, 30, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #6a3a10, transparent);
  }

  .card::after {
    content: '';
    position: absolute;
    bottom: 28px; left: 60px; right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #6a3a10, transparent);
  }

  /* Sodium-orange accent bar */
  .amber-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: #b8601a;
  }

  .lab-tag {
    font-size: 13px;
    letter-spacing: 0.2em;
    color: #464440;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Person name — what a stranger would recognize */
  .name {
    font-size: 78px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #d4d2c8;
    line-height: 1;
    margin-bottom: 20px;
    text-align: center;
    text-shadow:
      0 0 80px rgba(200, 110, 30, 0.22),
      0 0 30px rgba(200, 110, 30, 0.10);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 700px;
    margin-bottom: 20px;
  }

  .div-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #3e2108);
  }

  .div-line:last-child {
    background: linear-gradient(90deg, #3e2108, transparent);
  }

  .div-mark {
    color: #b8601a;
    font-size: 13px;
    letter-spacing: 0.15em;
    white-space: nowrap;
  }

  .epithet {
    font-size: 17px;
    color: #b8601a;
    letter-spacing: 0.06em;
    font-style: italic;
    margin-bottom: 28px;
    text-align: center;
  }

  .tags {
    display: flex;
    gap: 14px;
  }

  .tag {
    font-size: 13px;
    color: #b8601a;
    border: 1px solid #3e2108;
    padding: 4px 14px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: rgba(200, 110, 30, 0.05);
  }
</style>
</head>
<body>
  <div class="stripes"></div>
  <div class="amber-bar"></div>
  <div class="glow-blob"></div>
  <div class="card">
    <div class="lab-tag">The Elect &mdash; Voice Lab</div>
    <div class="name">PHILIP K. DICK</div>
    <div class="divider">
      <span class="div-line"></span>
      <span class="div-mark">&#x25A0; HORSELOVER FAT &middot; VALIS &#x25A0;</span>
      <span class="div-line"></span>
    </div>
    <div class="epithet">A paranoid-ontological register study &middot; withheld for copyright</div>
    <div class="tags">
      <span class="tag">Local only</span>
      <span class="tag">No release</span>
      <span class="tag">The Elect console</span>
    </div>
  </div>
</body>
</html>
